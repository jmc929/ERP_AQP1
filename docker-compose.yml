version: "3.8"

services:
  backend:
    build:
      context: ./acquapack-erp-back
      dockerfile: Dockerfile
    restart: always
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN}
      NODE_ENV: production
      PORT: 4000
    volumes:
      - documentos:/app/documentos
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./acquapack-erp-front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  documentos:
